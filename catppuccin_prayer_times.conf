# vim:set ft=tmux:
%hidden MODULE_NAME='ctp_prayer_times'

set-option -ogq "@catppuccin_${MODULE_NAME}_icon" '🕌 '
set-option -ogq "@catppuccin_${MODULE_NAME}_color" '#($MUSLIM_PRAYERS_DIR/scripts/prayer_times.sh color)'
set-option -ogq "@catppuccin_${MODULE_NAME}_text" '#($MUSLIM_PRAYERS_DIR/scripts/prayer_times.sh status)'

source-file -F '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/utils/status_module.conf'
